<div class="content-wrapper">
  <div class="page-header">
    <h2><i class="bi bi-people me-2"></i>Team Directory</h2>
  </div>

  <div class="card shadow-sm border-0 fade-in">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>Name</th>
              <th>Role</th>
              <th>Location</th>
              <th>Email</th>
            </tr>
          </thead>
          <tbody>
            @for (user of users; track user.id) {
              <tr>
                <td>
                  <div class="d-flex align-items-center">
                    <div class="user-avatar me-2">
                      <i class="bi bi-person-fill"></i>
                    </div>
                    <span class="fw-semibold">{{ user.name }}</span>
                  </div>
                </td>
                <td>
                  <span class="badge rounded-pill" [ngClass]="user.role === 'Admin' ? 'badge-in-use' : 'bg-secondary'">
                    {{ user.role }}
                  </span>
                </td>
                <td><i class="bi bi-geo-alt me-1 text-muted"></i>{{ user.location }}</td>
                <td class="text-muted">{{ user.email }}</td>
              </tr>
            } @empty {
              <tr>
                <td colspan="4" class="text-center py-5">
                  <i class="bi bi-people fs-1 text-muted d-block mb-2"></i>
                  <span class="text-muted">No users found.</span>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
