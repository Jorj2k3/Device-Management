<div class="auth-page d-flex align-items-center justify-content-center">
  <div class="auth-card fade-in">
    <div class="auth-header">
      <div class="auth-icon">
        <i class="bi bi-person-plus"></i>
      </div>
      <h2>Create Account</h2>
      <p>Join Device Management</p>
    </div>

    <div class="auth-body">
      @if (errorMessage) {
        <div class="alert alert-danger d-flex align-items-center" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          {{ errorMessage }}
        </div>
      }

      <form (ngSubmit)="onSubmit()">
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="inputName" name="name"
                 placeholder="John Doe" [(ngModel)]="newUser.name" required>
          <label for="inputName"><i class="bi bi-person me-1"></i> Full Name</label>
        </div>

        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="inputEmail" name="email"
                 placeholder="name@example.com" [(ngModel)]="newUser.email" required>
          <label for="inputEmail"><i class="bi bi-envelope me-1"></i> Email address</label>
        </div>

        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="inputPassword" name="password"
                 placeholder="Password" [(ngModel)]="newUser.password" required>
          <label for="inputPassword"><i class="bi bi-key me-1"></i> Password</label>
        </div>

        <div class="form-floating mb-4">
          <input type="text" class="form-control" id="inputLocation" name="location"
                 placeholder="New York" [(ngModel)]="newUser.location" required>
          <label for="inputLocation"><i class="bi bi-geo-alt me-1"></i> Location</label>
        </div>

        <button class="btn btn-primary btn-lg w-100" type="submit">
          <i class="bi bi-check-circle me-2"></i>Sign Up
        </button>
      </form>
    </div>

    <div class="auth-footer">
      Already have an account?
      <a routerLink="/login">Log in here</a>
    </div>
  </div>
</div>
