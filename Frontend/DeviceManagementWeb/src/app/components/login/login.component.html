<div class="auth-page d-flex align-items-center justify-content-center">
  <div class="auth-card fade-in">
    <div class="auth-header">
      <div class="auth-icon">
        <i class="bi bi-shield-lock"></i>
      </div>
      <h2>Welcome Back</h2>
      <p>Sign in to Device Management</p>
    </div>

    <div class="auth-body">
      @if (errorMessage) {
        <div class="alert alert-danger d-flex align-items-center" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          {{ errorMessage }}
        </div>
      }

      <form (ngSubmit)="onSubmit()">
        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="inputEmail" name="email"
                 placeholder="name@example.com" [(ngModel)]="credentials.email" required>
          <label for="inputEmail"><i class="bi bi-envelope me-1"></i> Email address</label>
        </div>

        <div class="form-floating mb-4">
          <input type="password" class="form-control" id="inputPassword" name="password"
                 placeholder="Password" [(ngModel)]="credentials.password" required>
          <label for="inputPassword"><i class="bi bi-key me-1"></i> Password</label>
        </div>

        <button class="btn btn-primary btn-lg w-100" type="submit">
          <i class="bi bi-box-arrow-in-right me-2"></i>Log In
        </button>
      </form>
    </div>

    <div class="auth-footer">
      Don't have an account?
      <a routerLink="/signup">Create one now</a>
    </div>
  </div>
</div>
