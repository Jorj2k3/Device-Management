<div class="container mt-5">
  
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Device Inventory</h2>
    @if (isAdmin) {
      <button class="btn btn-primary" (click)="onOpenCreate()">Add New Device</button>
    }
  </div>

  <div class="row">
    
    <div [class]="(selectedDevice || isCreating || isEditing) ? 'col-lg-7' : 'col-12'">
      <app-device-table 
        [devices]="devices" 
        [selectedDeviceId]="selectedDevice?.id"
        (viewDevice)="onViewDevice($event)">
      </app-device-table>
    </div>

    @if (selectedDevice && !isCreating && !isEditing) {
      <div class="col-lg-5">
        <app-device-details 
          [device]="selectedDevice" 
          [isAdmin]="isAdmin"
          (close)="onCloseDetails()"
          (edit)="onOpenEdit()"
          (delete)="onDeleteDevice($event)">
        </app-device-details>
      </div>
    }

    @if (isCreating || isEditing) {
      <div class="col-lg-5">
        <app-device-form 
          [isEditing]="isEditing"
          [initialData]="selectedDevice"
          (save)="onSaveDevice($event)"
          (cancel)="onCloseForm()">
        </app-device-form>
      </div>
    }

  </div>
</div>
