<div class="content-wrapper">
  
  @if (isAdmin) {
    <div class="page-header">
      <h2><i class="bi bi-laptop me-2"></i>Device Inventory</h2>
      <button class="btn btn-primary" (click)="onOpenCreate()">
        <i class="bi bi-plus-lg me-1"></i> Add New Device
      </button>
    </div>

    <div class="row">
      <div [class]="(selectedDevice || isCreating || isEditing) ? 'col-lg-7' : 'col-12'">
        <app-device-table 
          [devices]="devices" 
          [selectedDeviceId]="selectedDevice?.id"
          [mode]="'admin'" 
          (viewDevice)="onViewDevice($event)">
        </app-device-table>
      </div>

      @if (selectedDevice && !isCreating && !isEditing) {
        <div class="col-lg-5">
          <app-device-details [device]="selectedDevice" [isAdmin]="isAdmin"
            (close)="onCloseDetails()" (edit)="onOpenEdit()" (delete)="onDeleteDevice($event)">
          </app-device-details>
        </div>
      }

      @if (isCreating || isEditing) {
        <div class="col-lg-5">
          <app-device-form [isEditing]="isEditing" [initialData]="selectedDevice" [existingDevices]="devices" 
            (save)="onSaveDevice($event)" (cancel)="onCloseForm()">
          </app-device-form>
        </div>
      }
    </div>
    
  } @else {
    <div class="row mt-4">
      <div class="col-12">
        
        @if (activeTab === 'my-devices') {
          <h3 class="mb-3 text-primary"><i class="bi bi-person-badge me-2"></i>My Assigned Devices</h3>
          <app-device-table 
            [devices]="myDevices" 
            [mode]="'my-devices'"
            (unassign)="onUnassign($event)">
          </app-device-table>
        }
        
        @if (activeTab === 'available') {
          <h3 class="mb-3 text-success"><i class="bi bi-box-seam me-2"></i>Available in Inventory</h3>
          <app-device-table 
            [devices]="availableDevices" 
            [mode]="'available'"
            (assign)="onAssign($event)">
          </app-device-table>
        }

      </div>
    </div>
  }
</div>
