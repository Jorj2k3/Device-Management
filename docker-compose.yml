version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: devicemanagement-sql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SuperSecretPassw0rd!
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "SuperSecretPassw0rd!" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: devicemanagement-api
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=DeviceManagementDB;User Id=sa;Password=SuperSecretPassw0rd!;TrustServerCertificate=True;
      - Jwt__Key=SuperSecretKeyThatNeedsToBeAtLeast32CharactersLong!
      - Jwt__Issuer=DeviceManagementApi
      - Jwt__Audience=DeviceManagementWeb

  frontend:
    build:
      context: ./Frontend/DeviceManagementWeb
      dockerfile: Dockerfile
    container_name: devicemanagement-web
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sql_data: 