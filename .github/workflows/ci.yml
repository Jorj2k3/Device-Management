name: .NET Enterprise Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Code Quality (Lint)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Check Code Formatting
      run: dotnet format Backend/DeviceManagement.Api/DeviceManagement.Api.slnx --verify-no-changes

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Run Tests
      run: dotnet test Backend/DeviceManagement.Api/DeviceManagement.Api.slnx --logger html

  build:
    name: Build & Verify
    needs: [lint, unit-tests]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore Backend/DeviceManagement.Api/DeviceManagement.Api.slnx
    - name: Build project
      run: dotnet build Backend/DeviceManagement.Api/DeviceManagement.Api.slnx --no-restore --configuration Release
